run_name: densenet121_seed42_fold0
model_name: densenet121
seed: 42

image_size: 224
batch_size: 32
num_epochs: 30
patience: 7

optimizer:
  name: adamw
  backbone_lr: 1.0e-4
  head_lr: 1.0e-3
  weight_decay: 1.0e-4

loss_type: bce_logits
scheduler_type: cosine

checkpoint_metric:
  name: val_macro_auroc
  mode: max

augmentation:
  train:
    resize: 256
    crop_size: 224
    horizontal_flip: false
    rotation_deg: 5
    brightness: 0.05
    contrast: 0.05
  eval:
    resize: 256
    crop_size: 224

output_dir: models/runs